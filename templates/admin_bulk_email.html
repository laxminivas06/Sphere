{% extends "layout.html" %}


{% block content %}
        <header style="margin-bottom: 3rem;">
            <div style="display:flex; justify-content: space-between; align-items: center;">
                <div>
                    <h1>Bulk Communication <span style="color: var(--primary)">Utility</span></h1>
                    <p style="color: var(--text-muted)">Send professional emails to your event participants.</p>
                </div>
                <i class="fas fa-paper-plane" style="font-size: 3rem; color: var(--primary); opacity: 0.3;"></i>
            </div>
        </header>

        <div class="card glass" style="padding: 2.5rem; border-radius: 24px;">
            <form id="bulkEmailForm" style="display:grid; gap:2rem;">
                <div class="form-group">
                    <label style="margin-bottom:1rem; display:block;">1. Select Target Event</label>
                    <select id="bulkEmailEventId" required style="font-size: 1rem; padding: 0.8rem;">
                        <option value="">-- Select an Event --</option>
                        {% for e in events %}
                        <option value="{{ e.id }}">{{ e.title }} ({{ e.date }})</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label style="margin-bottom:1rem; display:block;">2. Choose Audience</label>
                    <div class="email-grid" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap:1.5rem;">
                        <div class="email-target-card active" onclick="setTarget('all', this)">
                            <i class="fas fa-users" style="color: var(--info)"></i>
                            <h4>All Participants</h4>
                            <p style="font-size:0.85rem; color:var(--text-muted); margin-top:0.5rem;">Everyone registered for this event</p>
                        </div>
                        <div class="email-target-card" onclick="setTarget('verified', this)">
                            <i class="fas fa-user-check" style="color: var(--success)"></i>
                            <h4>Verified Only</h4>
                            <p style="font-size:0.85rem; color:var(--text-muted); margin-top:0.5rem;">Only students whose payment is verified</p>
                        </div>
                    </div>
                    <input type="hidden" id="bulkEmailTarget" value="all">
                </div>

                <div class="form-group">
                    <label>3. Email Subject</label>
                    <input type="text" id="bulkEmailSubject" placeholder="e.g. Important Update regarding the Event" required style="font-size: 1rem; padding: 0.8rem;">
                </div>

                <div class="form-group">
                    <label>4. Message Content</label>
                    <textarea id="bulkEmailContent" rows="12" placeholder="Dear Students,&#10;&#10;Type your message here..." required 
                        style="font-family: inherit; resize: vertical; padding: 1rem; font-size:1rem;"></textarea>
                </div>

                <div style="margin-top: 1rem;">
                    <button type="submit" class="btn btn-primary" style="width:100%; padding: 1.2rem; font-size: 1.1rem; border-radius: 14px;">
                        <i class="fas fa-paper-plane"></i> Dispatch Bulk Emails
                    </button>
                </div>
            </form>
        </div>
    </main>
</div>

<script>
    function setTarget(val, el) {
        document.getElementById('bulkEmailTarget').value = val;
        document.querySelectorAll('.email-target-card').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
    }

    document.getElementById('bulkEmailForm').onsubmit = async (ev) => {
        ev.preventDefault();
        const btn = ev.target.querySelector('button[type="submit"]');
        const originalText = btn.innerHTML;
        
        if (!confirm("Are you sure you want to send this email to all selected recipients?")) return;

        btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Dispatching emails...';

        const payload = {
            club_id: '{{ club.id }}',
            event_id: document.getElementById('bulkEmailEventId').value,
            subject: document.getElementById('bulkEmailSubject').value,
            content: document.getElementById('bulkEmailContent').value,
            target: document.getElementById('bulkEmailTarget').value
        };

        try {
            const res = await fetch('/api/bulk-email', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            if (data.success) {
                showToast(`Successfully dispatched to ${data.count} recipients!`, 'success');
                setTimeout(() => {
                    window.location.href = '/admin/club/{{ club.id }}';
                }, 2000);
            } else {
                showToast(data.message || 'Transmission failed', 'error');
                btn.disabled = false; btn.innerHTML = originalText;
            }
        } catch (e) {
            showToast('SMTP Connection Error', 'error');
            btn.disabled = false; btn.innerHTML = originalText;
        }
    };
</script>
{% endblock %}
