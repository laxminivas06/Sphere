{% extends "em_layout.html" %}
{% block em_content %}
<div id="tab-settings" class="tab-pane active">
  <div class="section-header"><h2>Payment Gateway Settings</h2></div>
  <div style="max-width:560px;">
    <div style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:18px;padding:2rem;margin-bottom:1.5rem;">
      <div style="display:flex;align-items:center;gap:.75rem;margin-bottom:1.5rem;">
        <div style="width:40px;height:40px;border-radius:10px;background:rgba(99,102,241,.15);display:flex;align-items:center;justify-content:center;color:var(--em-indigo);"><i class="fas fa-credit-card"></i></div>
        <div><h3 style="margin:0;font-size:1rem;">Razorpay Integration</h3><p style="margin:0;font-size:.78rem;color:var(--text-muted);">No-cost setup · Free to start</p></div>
      </div>
      <div class="form-em">
        <div class="form-grid-2">
          <div class="form-group-em">
            <label>Razorpay Key ID</label>
            <input type="text" id="rzpKeyId" placeholder="rzp_test_XXXXXXXXXXXXXXXX" value="{{ settings.razorpay_key_id or '' }}">
          </div>
          <div class="form-group-em">
            <label>Razorpay Key Secret</label>
            <input type="password" id="rzpKeySecret" placeholder="Your key secret" value="{{ settings.razorpay_key_secret or '' }}">
          </div>
        </div>
        
        <div style="margin-top:1.5rem; padding:1.25rem; background:rgba(99,102,241,0.06); border:1px solid rgba(99,102,241,0.15); border-radius:14px; display:flex; align-items:center; justify-content:space-between; gap:1rem;">
          <div>
            <h4 style="margin:0; font-size:0.9rem; color:var(--em-indigo);">Payment Demo Mode</h4>
            <p style="margin:0.25rem 0 0; font-size:0.75rem; color:var(--text-muted);">Enable to skip real payments and use mock verification for testing.</p>
          </div>
          <label class="toggle-switch">
            <input type="checkbox" id="payDemoMode" {% if settings.payment_demo_mode %}checked{% endif %}>
            <span class="toggle-slider" style="background:var(--border-light);"></span>
          </label>
        </div>
      </div>
    </div>

    <div style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:18px;padding:2rem;margin-bottom:1.5rem;">
      <div style="display:flex;align-items:center;gap:.75rem;margin-bottom:1.5rem;">
        <div style="width:40px;height:40px;border-radius:10px;background:rgba(20,184,166,.15);display:flex;align-items:center;justify-content:center;color:var(--em-teal);"><i class="fas fa-paper-plane"></i></div>
        <div><h3 style="margin:0;font-size:1rem;">Email Server (SMTP)</h3><p style="margin:0;font-size:.78rem;color:var(--text-muted);">Send verification & bulk emails</p></div>
      </div>
      <div class="form-em">
        <div class="form-grid-2">
          <div class="form-group-em"><label>SMTP Server (Fixed)</label><input type="text" id="smtpServer" placeholder="smtp.gmail.com" value="{{ settings.smtp_server or '' }}" readonly style="background:rgba(255,255,255,0.03);cursor:not-allowed;opacity:0.7;"></div>
          <div class="form-group-em"><label>SMTP Port (Fixed)</label><input type="number" id="smtpPort" placeholder="587" value="{{ settings.smtp_port or '' }}" readonly style="background:rgba(255,255,255,0.03);cursor:not-allowed;opacity:0.7;"></div>
        </div>
        <div class="form-grid-2">
          <div class="form-group-em"><label>SMTP User</label><input type="text" id="smtpUser" placeholder="your-email@gmail.com" value="{{ settings.smtp_user or '' }}"></div>
          <div class="form-group-em"><label>SMTP Password</label><input type="password" id="smtpPass" placeholder="App-specific password" value="{{ settings.smtp_pass or '' }}"></div>
        </div>
      </div>
    </div>

    <div style="margin-top:2rem;">
      <button onclick="saveSettings()" style="background:linear-gradient(135deg,var(--em-indigo),var(--em-purple));border:none;border-radius:12px;padding:.9rem 2.5rem;color:#fff;font-weight:700;cursor:pointer;transition:.2s;width:100%;" onmouseover="this.style.opacity='.85'" onmouseout="this.style.opacity='1'">
        Save All Settings
      </button>
      <div id="settingsMsg" style="display:none;padding:.75rem;border-radius:10px;font-size:.85rem;margin-top:1rem;"></div>
    </div>
  </div>
</div>

<style>
.toggle-switch { position: relative; display: inline-block; width: 44px; height: 24px; }
.toggle-switch input { opacity: 0; width: 0; height: 0; }
.toggle-slider { position: absolute; cursor: pointer; inset: 0; background-color: var(--surface-2); transition: .4s; border-radius: 24px; border: 1px solid var(--border-light); }
.toggle-slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 2px; bottom: 2px; background-color: white; transition: .4s; border-radius: 50%; }
input:checked + .toggle-slider { background-color: var(--em-indigo); }
input:checked + .toggle-slider:before { transform: translateX(20px); }
</style>

<script>
function saveSettings() {
  const data = {
    razorpay_key_id: document.getElementById('rzpKeyId').value,
    razorpay_key_secret: document.getElementById('rzpKeySecret').value,
    payment_demo_mode: document.getElementById('payDemoMode').checked,
    smtp_user: document.getElementById('smtpUser').value,
    smtp_pass: document.getElementById('smtpPass').value
  };
  fetch('/em/api/settings/save', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  }).then(r => r.json()).then(res => {
    const msg = document.getElementById('settingsMsg');
    msg.style.display = 'block';
    msg.innerText = res.success ? '✅ Settings saved successfully!' : '❌ Error: ' + res.message;
    msg.style.background = res.success ? 'rgba(16,185,129,.1)' : 'rgba(239,68,68,.1)';
    msg.style.color = res.success ? '#10b981' : '#f87171';
  });
}
</script>
{% endblock %}
