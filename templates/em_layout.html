{% extends "layout.html" %}
{% block content %}
<style>
:root{--em-purple:#8b5cf6;--em-indigo:#6366f1;--em-teal:#14b8a6;--em-pink:#ec4899;--em-sidebar-width:280px;}
.em-layout{display:grid;grid-template-columns:var(--em-sidebar-width) 1fr;margin-top:0 !important;min-height:calc(100vh - 68px);}
.em-main{padding:2.5rem;min-width:0;background:transparent;}
/* Stats */
.stats-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:1.25rem;margin-bottom:2.5rem;}
.stat-tile{background:var(--card-bg);border:1px solid var(--border-light);border-radius:18px;padding:1.4rem 1.5rem;position:relative;overflow:hidden;transition:all .2s;box-shadow:var(--shadow-sm);}
.stat-tile:hover{transform:translateY(-2px);border-color:var(--primary);box-shadow:var(--shadow-md);}
.stat-tile::before{content:'';position:absolute;top:-30%;right:-10%;width:120px;height:120px;border-radius:50%;opacity:.05;background:var(--primary);}
.stat-tile-label{font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:.35rem;font-weight:700;}
.stat-tile-val{font-size:2rem;font-weight:800;line-height:1;color:var(--white);}
.stat-tile-sub{font-size:.75rem;color:var(--text-muted);margin-top:.3rem;}
/* Cards */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;gap:1rem;flex-wrap:wrap;}
.section-header h2{font-size:1.15rem;font-weight:700;margin:0;}
.event-row{background:var(--card-bg);border:1px solid var(--border-light);border-radius:16px;padding:1.25rem 1.5rem;display:flex;gap:1rem;align-items:center;margin-bottom:.75rem;transition:all .2s;flex-wrap:wrap;box-shadow:var(--shadow-sm);}
.event-row:hover{border-color:var(--primary);background:var(--surface-2);}
.event-row-banner{width:60px;height:60px;border-radius:12px;object-fit:cover;flex-shrink:0;background:rgba(99,102,241,.15);display:flex;align-items:center;justify-content:center;font-size:1.5rem;}
.event-row-info{flex:1;}
.event-row-title{font-weight:800;font-size:.95rem;margin-bottom:.25rem;color:var(--white);}
.event-row-meta{font-size:.78rem;color:var(--text-muted);display:flex;gap:.75rem;flex-wrap:wrap;}
.event-actions{display:flex;gap:.5rem;flex-wrap:wrap;}
.btn-sm{padding:.45rem .9rem;border-radius:8px;font-size:.78rem;font-weight:600;cursor:pointer;border:1px solid;transition:.2s;text-decoration:none;display:inline-flex;align-items:center;gap:.35rem;}
.btn-sm:hover{opacity:.8;}
.btn-sm-primary{background:rgba(99,102,241,.2);border-color:rgba(99,102,241,.4);color:var(--em-indigo);}
.btn-sm-danger{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3);color:#f87171;}
.btn-sm-teal{background:rgba(20,184,166,.1);border-color:rgba(20,184,166,.3);color:var(--em-teal);}
.btn-sm-green{background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.3);color:#10b981;}
.btn-sm-amber{background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.3);color:#f59e0b;}
.badge{padding:.2rem .6rem;border-radius:6px;font-size:.68rem;font-weight:700;text-transform:uppercase;}
.badge-free{background:rgba(16,185,129,.15);color:#10b981;}
.badge-paid{background:rgba(245,158,11,.15);color:#f59e0b;}
.badge-active{background:rgba(99,102,241,.15);color:var(--em-indigo);}
.badge-cancelled{background:rgba(239,68,68,.1);color:#f87171;}
/* Modal */
.em-modal{display:none;position:fixed;inset:0;background:rgba(15,23,42,0.8);z-index:999;justify-content:center;align-items:center;padding:1rem;}
.em-modal-box{background:var(--bg);border:1px solid var(--border-light);border-radius:24px;padding:2.25rem;width:100%;max-width:620px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);}
.em-modal-box h3{margin-bottom:.35rem;font-size:1.15rem;color:var(--white);font-weight:800;}
.form-em{display:flex;flex-direction:column;gap:.85rem;}
.form-group-em label{display:block;font-size:.78rem;color:var(--text-muted);margin-bottom:.35rem;text-transform:uppercase;letter-spacing:.06em;font-weight:700;}
.form-group-em input,.form-group-em select,.form-group-em textarea{width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--border-light);border-radius:10px;padding:.75rem 1rem;color:var(--white);font-size:.9rem;outline:none;transition:.2s;}
.form-group-em input:focus,.form-group-em select:focus,.form-group-em textarea:focus{border-color:var(--primary);background:rgba(255,255,255,0.08);box-shadow:0 0 0 3px rgba(99,102,241,0.1);}
.form-group-em select option{background:var(--navy-deeper);color:var(--white);}
.form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:.85rem;}
.role-badge{display:inline-flex;align-items:center;gap:.4rem;padding:.35rem .85rem;border-radius:20px;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;}
.role-badge-manager{background:linear-gradient(135deg,rgba(99,102,241,.2),rgba(139,92,246,.2));color:var(--em-purple);border:1px solid rgba(139,92,246,.3);}
.role-badge-admin{background:rgba(20,184,166,.12);color:var(--em-teal);border:1px solid rgba(20,184,166,.25);}
/* Analytics grid */
.analytics-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-bottom:2.5rem;}
.analytics-card{background:var(--card-bg);border:1px solid var(--border-light);border-radius:18px;padding:1.5rem;box-shadow:var(--shadow-sm);transition:all .2s;}
.analytics-card:hover{border-color:var(--primary);}
.analytics-card h4{font-size:.75rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);margin-bottom:1.25rem;font-weight:700;}
canvas{max-height:280px;width:100% !important;}
.sidebar::-webkit-scrollbar{display:none;}
@media (max-width: 1100px) {
  .analytics-grid { grid-template-columns: 1fr; }
}
@media (max-width: 900px) {
  .em-layout { grid-template-columns: 1fr; margin-top: 0; }
  .sidebar { display: none !important; }
  .em-main { padding: 1.5rem; }
}
</style>



    {% block em_content %}{% endblock %}

<script>
function openModal(id){ document.getElementById(id).style.display='flex'; }
function closeModal(id){ document.getElementById(id).style.display='none'; }
window.onclick = function(e){ if(e.target.classList.contains('em-modal')) e.target.style.display='none'; }
</script>
{% endblock %}
